services:
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   networks:
  #     - eskol_net
  #   depends_on:
  #     - frontend
  #     - backend
  #     - wordpress

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8084:8000"
    volumes:
      - ./backend:/app
    networks:
      - eskol_net
    depends_on:
      mariadb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=http://localhost:8084
      - VITE_APP_URL=http://localhost:8083
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "8083:80"
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    networks:
      - eskol_net

  wordpress:
    image: wordpress:latest
    env_file:
      - .env
    ports:
      - "8082:80"
    volumes:
      - ./data/wordpress:/var/www/html
    networks:
      - eskol_net
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:10.11
    env_file:
      - .env
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - eskol_net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    env_file:
      - .env
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - eskol_net

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8089:80"
    environment:
      PMA_HOST: mariadb
    networks:
      - eskol_net
    depends_on:
      - mariadb

  n8n:
    image: n8nio/n8n
    entrypoint:
      - sh
      - -c
      - mkdir -p /home/node/.n8n && printf '{}' > /home/node/.n8n/config && exec /docker-entrypoint.sh
    environment:
      N8N_ENCRYPTION_KEY: eskol-local-dev-encryption-key
    ports:
      - "8085:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - .env
    networks:
      - eskol_net

networks:
  eskol_net:
    name: eskol_net
    driver: bridge

volumes:
  n8n_data:
